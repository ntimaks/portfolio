
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute">
  <defs>
    
    <filter id="halftone" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feColorMatrix type="matrix" values="0.33 0.33 0.33 0 0&#xA;                                          0.33 0.33 0.33 0 0&#xA;                                          0.33 0.33 0.33 0 0&#xA;                                          0    0    0    1 0"></feColorMatrix>
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.6" intercept="-0.3"></feFuncR>
        <feFuncG type="linear" slope="1.6" intercept="-0.3"></feFuncG>
        <feFuncB type="linear" slope="1.6" intercept="-0.3"></feFuncB>
      </feComponentTransfer>
    </filter>
    
    <filter id="dither-1bit" x="0" y="0" width="100%" height="100%">
      <feColorMatrix type="matrix" values="0.33 0.33 0.33 0 0&#xA;                                          0.33 0.33 0.33 0 0&#xA;                                          0.33 0.33 0.33 0 0&#xA;                                          0    0    0    1 0"></feColorMatrix>
      <feComponentTransfer>
        <feFuncR type="discrete" tableValues="0 1"></feFuncR>
        <feFuncG type="discrete" tableValues="0 1"></feFuncG>
        <feFuncB type="discrete" tableValues="0 1"></feFuncB>
      </feComponentTransfer>
    </filter>
    
    <filter id="paper-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"></feTurbulence>
      <feColorMatrix values="0 0 0 0 0.05&#xA;                              0 0 0 0 0.04&#xA;                              0 0 0 0 0.03&#xA;                              0 0 0 0.08 0"></feColorMatrix>
    </filter>
  </defs>
</svg>